version: '3.8'

services:
  elasticsearch:
    # 1. 이미지 및 컨테이너 설정
    image: docker.elastic.co/elasticsearch/elasticsearch:8.8.0
    container_name: custom-elasticsearch
    restart: always

    # 2. 환경 변수 (싱글 노드 설정)
    environment:
      - node.name=es01
      - cluster.name=es-docker-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false # 개발 편의를 위해 보안 비활성화
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - TZ=Asia/Seoul

    # 3. 포트 포워딩
    ports:
      - "9200:9200"

    # 4. 볼륨 설정
    volumes:
      - ./es_data:/usr/share/elasticsearch/data

    # 5. 리소스 제한 (ES는 메모리를 많이 먹으므로 1G 권장)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

    # 6. 네트워크 설정
    networks:
      - backend-network

    # 7. 헬스 체크
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 5

networks:
  backend-network:
    driver: bridge