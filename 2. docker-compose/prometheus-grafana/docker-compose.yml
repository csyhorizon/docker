version: '3.8'

services:
  prometheus:
    # 1. 이미지 및 컨테이너 설정
    image: prom/prometheus:latest
    container_name: custom-prometheus
    restart: always

    # 2. 환경 변수
    environment:
      TZ: Asia/Seoul

    # 3. 포트 포워딩
    ports:
      - "9090:9090"

    # 4. 볼륨 설정
    volumes:
      - ./prometheus_data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml # 설정 파일 미리 생성 필요

    # 5. 리소스 제한
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

    # 6. 네트워크 설정
    networks:
      - backend-network

  grafana:
    image: grafana/grafana:latest
    container_name: custom-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=password123
      - TZ=Asia/Seoul
    volumes:
      - ./grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge