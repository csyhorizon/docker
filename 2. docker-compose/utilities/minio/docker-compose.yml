version: '3.8'

services:
  minio:
    # 1. 이미지 및 컨테이너 설정
    image: minio/minio:latest
    container_name: custom-minio
    restart: always
    command: server /data --console-address ":9001"

    # 2. 환경 변수 (로그인 정보)
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
      TZ: Asia/Seoul

    # 3. 포트 포워딩
    ports:
      - "9000:9000" # API 포트
      - "9001:9001" # 웹 콘솔 포트

    # 4. 볼륨 설정
    volumes:
      - ./minio_data:/data

    # 5. 리소스 제한
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

    # 6. 네트워크 설정
    networks:
      - backend-network

    # 7. 헬스 체크
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

networks:
  backend-network:
    driver: bridge