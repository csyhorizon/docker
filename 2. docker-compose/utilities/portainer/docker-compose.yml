version: '3.8'

services:
  portainer:
    # 1. 이미지 및 컨테이너 설정
    image: portainer/portainer-ce:latest  # 커뮤니티 에디션
    container_name: custom-portainer
    restart: always

    # 2. 환경 변수
    environment:
      TZ: Asia/Seoul

    # 3. 포트 포워딩
    ports:
      - "9000:9000"                        # HTTP 접속 포트
      - "9443:9443"                        # HTTPS 접속 포트

    # 4. 볼륨 설정 (도커 소켓 연결 필수)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # 호스트 도커 엔진과 통신
      - ./portainer_data:/data                    # 설정 데이터 저장

    # 5. 리소스 제한
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

    # 6. 네트워크 설정
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge